retriever_type: hybrid
retrieval_top_k: 50
reranker_top_k: 20

use_reranker: true

pruning_strategy: threshold
pruning_threshold: 0.0
context_top_k: 5
mmr_lambda: 0.7

generator_backend: local
generator_model: TinyLlama/TinyLlama-1.1B-Chat-v1.0
max_new_tokens: 512

use_vlp: false
vlp_backend: internvl2
vlp_model: null

bm25_path: data/embeddings/bm25.pkl
faiss_path: data/embeddings/dense.faiss
chunks_path: data/embeddings/chunks.jsonl
